name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'proto/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .so plugin
        run: |
          docker build -t tictactoe-builder -f backend/Dockerfile .
          docker create --name tmp-tictactoe tictactoe-builder
          docker cp tmp-tictactoe:/backend/tictactoe.so ./backend/tictactoe.so
          docker rm tmp-tictactoe

      - name: Copy .so to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/tictactoe.so
          target: /home/ubuntu/tic-tac-toe/backend/
          strip_components: 1

      - name: Restart Nakama
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/tic-tac-toe
            docker compose -f docker-compose.prod.yml --env-file .env.prod restart nakama
