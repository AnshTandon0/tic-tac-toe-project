syntax = "proto3";
package tictactoe;
option go_package = "tictactoe/gen";

import "google/protobuf/empty.proto";

// ── Enums ─────────────────────────────────────────────────────────────────────

enum MatchPhase {
  MATCH_PHASE_UNSPECIFIED = 0;
  MATCH_PHASE_WAITING     = 1;
  MATCH_PHASE_PLAYING     = 2;
  MATCH_PHASE_OVER        = 3;
}

enum Symbol {
  SYMBOL_UNSPECIFIED = 0;
  SYMBOL_X           = 1;
  SYMBOL_O           = 2;
}

// ── Match Data Messages (binary wire format over WebSocket) ───────────────────

// C→S  opcode 11
message MakeMoveRequest {
  int32 cell_index = 1;
}

// S→C  opcode 1
message GameStateMessage {
  repeated string board        = 1;
  string          player_x     = 2;
  string          player_o     = 3;
  string          current_turn = 4;
  MatchPhase      phase        = 5;
}

// S→C  opcode 2
message BoardUpdateMessage {
  repeated string board        = 1;
  string          current_turn = 2;
  int32           move_index   = 3;
  string          moved_by     = 4;
}

// S→C  opcode 3
message GameOverMessage {
  repeated string board    = 1;
  string          winner   = 2;
  repeated int32  win_line = 3;
  string          player_x = 4;
  string          player_o = 5;
}

// S→C  opcode 4
message PlayerJoinedMessage {
  string player_id = 1;
  Symbol symbol    = 2;
  string username  = 3;
}

// S→C  opcode 5
message PlayerLeftMessage {
  string player_id = 1;
}

// ── RPC Messages (protojson wire format) ─────────────────────────────────────

message CreateMatchRequest  {}
message CreateMatchResponse { string match_id = 1; }

// ── Service ───────────────────────────────────────────────────────────────────

service TicTacToeService {
  // [HTTP] POST /v2/rpc/rpc_create_match
  rpc CreateMatch (CreateMatchRequest) returns (CreateMatchResponse);

  // [WS] opcode 11
  rpc MakeMove (MakeMoveRequest) returns (BoardUpdateMessage);

  // Server-push (no client request)
  rpc OnGameState    (google.protobuf.Empty) returns (GameStateMessage);
  rpc OnBoardUpdate  (google.protobuf.Empty) returns (BoardUpdateMessage);
  rpc OnGameOver     (google.protobuf.Empty) returns (GameOverMessage);
  rpc OnPlayerJoined (google.protobuf.Empty) returns (PlayerJoinedMessage);
  rpc OnPlayerLeft   (google.protobuf.Empty) returns (PlayerLeftMessage);
}
