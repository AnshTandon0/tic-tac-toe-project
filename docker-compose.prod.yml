version: "3.8"

# Production compose — run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires a .env.prod file (copy from .env.prod.example and fill in secrets):
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB:       nakama
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed — only nakama talks to postgres over the internal network
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nakama:
    image: heroiclabs/nakama:3.22.0
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address postgres:${DB_PASSWORD}@postgres:5432/nakama &&
        exec /nakama/nakama
        --database.address postgres:${DB_PASSWORD}@postgres:5432/nakama
        --runtime.path /nakama/data/modules
        --socket.port 7350
        --console.port 7351
        --session.token_expiry_sec 3600
        --runtime.http_key ${RUNTIME_HTTP_KEY}
        --socket.server_key ${NAKAMA_SERVER_KEY}
        --console.username ${CONSOLE_USERNAME}
        --console.password ${CONSOLE_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/nakama/data/modules:ro
    ports:
      # 7350 is NOT exposed externally — nginx proxies to it over localhost
      # Uncomment the line below only for debugging, never in production
      # - "127.0.0.1:7350:7350"
      - "7350:7350"
      - "7351:7351"   # Admin console — access only via SSH tunnel
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
