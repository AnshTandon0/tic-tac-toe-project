version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB:       nakama
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.22.0
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --database.address postgres:localdb@postgres:5432/nakama
        --runtime.path /nakama/data/modules
        --socket.port 7350
        --console.port 7351
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/nakama/data/modules
    ports:
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

volumes:
  pgdata:
